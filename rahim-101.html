<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Profile</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 400px;
    margin: auto;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.header {
    background: #0b3d2e;
    color: white;
    text-align: center;
    padding: 20px;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-top: -60px;
    border: 4px solid white;
    object-fit: cover;
}

.name {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.section {
    padding: 15px;
    border-top: 1px solid #eee;
}

.section h3 {
    margin: 0 0 10px;
    color: #0b3d2e;
}

.row {
    margin-bottom: 5px;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>ইউনিয়ন পরিষদ</h2>
    </div>

    <div style="text-align:center;">
        <img src="profile.jpg" class="profile-img">
        <div class="name">Rahim Uddin</div>
        <div>ইউনিয়ন পরিষদ প্রশাসনিক কর্মকর্তা</div>
    </div>

    <div class="section">
        <h3>📞 Contact</h3>
        <div class="row">Mobile: 01700000001</div>
        <div class="row">Email: rahim@gmail.com</div>
    </div>

    <div class="section">
        <h3>🩸 Medical</h3>
        <div class="row">Blood Group: B+</div>
    </div>

    <div class="section">
        <h3>🆔 Identity</h3>
        <div class="row">NID: 12345678901</div>
        <div class="row">ID No: 101</div>
    </div>

    <div class="section">
        <h3>🏠 Address</h3>
        <div class="row">Dhaka, Bangladesh</div>
    </div>

</div>

</body>
</html>
